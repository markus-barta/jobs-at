# Standalone compose — for LOCAL TESTING ONLY (e.g. on hsb1 or your Mac).
# On csb1, this service is added to ~/docker/docker-compose.yml instead.
# See deployment instructions in README.md.
name: jobs-at-local

services:
  jobs-at:
    build: .
    container_name: jobs-at
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80" # test locally at http://localhost:8082
    volumes:
      - ./site:/usr/share/nginx/html:ro
